<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#da7756"/>
    </marker>
    <marker id="arrowDown" markerWidth="6" markerHeight="8" refX="3" refY="8" orient="auto">
      <polygon points="0 0, 6 0, 3 8" fill="#da7756"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#0a0a0f" rx="8"/>

  <!-- ==================== LEFT SIDE: Sources ==================== -->

  <!-- Host Developer box -->
  <rect x="20" y="60" width="150" height="80" rx="8" fill="#1a1a2e" stroke="#30363d" stroke-width="1.5"/>
  <!-- Terminal icon -->
  <rect x="34" y="78" width="18" height="14" rx="2" fill="none" stroke="#da7756" stroke-width="1.2"/>
  <text x="37" y="89" font-family="monospace" font-size="8" fill="#da7756">&gt;_</text>
  <text x="58" y="88" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="#e0e0e8">Host Developer</text>
  <text x="34" y="122" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10" fill="#8888a0">CLI Tool</text>

  <!-- Team Member box -->
  <rect x="20" y="200" width="150" height="80" rx="8" fill="#1a1a2e" stroke="#30363d" stroke-width="1.5"/>
  <!-- Browser icon -->
  <rect x="34" y="218" width="18" height="14" rx="2" fill="none" stroke="#da7756" stroke-width="1.2"/>
  <line x1="34" y1="224" x2="52" y2="224" stroke="#da7756" stroke-width="1"/>
  <text x="58" y="228" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="#e0e0e8">Team Member</text>
  <text x="34" y="262" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10" fill="#8888a0">Web Client</text>

  <!-- ==================== ARROWS: Left to Center ==================== -->

  <line x1="170" y1="100" x2="222" y2="100" stroke="#da7756" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="170" y1="240" x2="222" y2="240" stroke="#da7756" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ==================== CENTER: VPC Boundary ==================== -->

  <rect x="230" y="30" width="340" height="450" rx="12" fill="#da7756" fill-opacity="0.03" stroke="#da7756" stroke-width="1.5" stroke-dasharray="8 4"/>
  <text x="400" y="54" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="#da7756" letter-spacing="1">YOUR NETWORK / VPC</text>

  <!-- Express Server box -->
  <rect x="280" y="75" width="240" height="100" rx="8" fill="#1a1a2e" stroke="#30363d" stroke-width="1.5"/>
  <text x="400" y="100" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#e0e0e8">Express Server</text>

  <!-- Sub-labels -->
  <rect x="300" y="112" width="80" height="24" rx="4" fill="#da7756" fill-opacity="0.08" stroke="#da7756" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="340" y="128" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10" fill="#da7756">Socket.IO</text>

  <rect x="400" y="112" width="80" height="24" rx="4" fill="#da7756" fill-opacity="0.08" stroke="#da7756" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="440" y="128" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10" fill="#da7756">REST API</text>

  <!-- Arrow down from server to components -->
  <line x1="400" y1="175" x2="400" y2="205" stroke="#da7756" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <!-- ==================== Component Row ==================== -->

  <!-- Audit Logger -->
  <rect x="252" y="210" width="90" height="44" rx="6" fill="#1a1a2e" stroke="#da7756" stroke-width="1" stroke-opacity="0.35"/>
  <text x="297" y="228" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="9" font-weight="600" fill="#e0e0e8">Audit</text>
  <text x="297" y="242" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="9" font-weight="600" fill="#e0e0e8">Logger</text>

  <!-- DLP Scanner -->
  <rect x="355" y="210" width="90" height="44" rx="6" fill="#1a1a2e" stroke="#da7756" stroke-width="1" stroke-opacity="0.35"/>
  <text x="400" y="228" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="9" font-weight="600" fill="#e0e0e8">DLP</text>
  <text x="400" y="242" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="9" font-weight="600" fill="#e0e0e8">Scanner</text>

  <!-- Session Recorder -->
  <rect x="458" y="210" width="90" height="44" rx="6" fill="#1a1a2e" stroke="#da7756" stroke-width="1" stroke-opacity="0.35"/>
  <text x="503" y="228" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="9" font-weight="600" fill="#e0e0e8">Session</text>
  <text x="503" y="242" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="9" font-weight="600" fill="#e0e0e8">Recorder</text>

  <!-- Arrow down from components to Docker -->
  <line x1="400" y1="254" x2="400" y2="290" stroke="#da7756" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <!-- ==================== Docker Container ==================== -->

  <rect x="280" y="295" width="240" height="100" rx="8" fill="#1a1a2e" stroke="#30363d" stroke-width="1.5"/>
  <!-- Docker whale icon (simplified) -->
  <rect x="296" y="312" width="14" height="10" rx="2" fill="none" stroke="#4a9eff" stroke-width="1.2"/>
  <line x1="299" y1="315" x2="299" y2="319" stroke="#4a9eff" stroke-width="1"/>
  <line x1="303" y1="315" x2="303" y2="319" stroke="#4a9eff" stroke-width="1"/>
  <line x1="307" y1="315" x2="307" y2="319" stroke="#4a9eff" stroke-width="1"/>
  <text x="316" y="321" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#e0e0e8">Docker Container</text>
  <text x="400" y="338" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="9" fill="#8888a0">(Sandboxed Execution)</text>

  <!-- Workspace sub-box -->
  <rect x="306" y="350" width="190" height="32" rx="4" fill="#0a0a0f" stroke="#30363d" stroke-width="1"/>
  <text x="401" y="370" text-anchor="middle" font-family="-apple-system, 'SF Mono', monospace" font-size="10" fill="#da7756">/workspace (shared volume)</text>

  <!-- ==================== ARROWS: Center to Right ==================== -->

  <!-- From Audit Logger to right -->
  <line x1="342" y1="232" x2="342" y2="232" stroke="#da7756" stroke-width="0"/>
  <line x1="548" y1="220" x2="608" y2="220" stroke="#da7756" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="4 2"/>

  <!-- From Session Recorder to right -->
  <line x1="548" y1="240" x2="608" y2="240" stroke="#da7756" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="4 2"/>

  <!-- Connection lines from component boxes to right arrows -->
  <line x1="297" y1="254" x2="297" y2="270" stroke="#da7756" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="297" y1="270" x2="570" y2="270" stroke="#da7756" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="570" y1="270" x2="570" y2="220" stroke="#da7756" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="570" y1="220" x2="608" y2="220" stroke="none"/>

  <line x1="503" y1="254" x2="503" y2="264" stroke="#da7756" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="503" y1="264" x2="560" y2="264" stroke="#da7756" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="560" y1="264" x2="560" y2="240" stroke="#da7756" stroke-width="1" stroke-opacity="0.4"/>

  <!-- ==================== RIGHT SIDE: Outputs ==================== -->

  <!-- Audit Logs output -->
  <rect x="616" y="195" width="160" height="50" rx="8" fill="#1a1a2e" stroke="#30363d" stroke-width="1.5"/>
  <!-- File icon -->
  <rect x="630" y="207" width="12" height="16" rx="1" fill="none" stroke="#da7756" stroke-width="1"/>
  <line x1="634" y1="213" x2="640" y2="213" stroke="#da7756" stroke-width="0.8"/>
  <line x1="634" y1="216" x2="639" y2="216" stroke="#da7756" stroke-width="0.8"/>
  <line x1="634" y1="219" x2="638" y2="219" stroke="#da7756" stroke-width="0.8"/>
  <text x="648" y="217" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10" font-weight="600" fill="#e0e0e8">Audit Logs</text>
  <text x="648" y="232" font-family="-apple-system, 'SF Mono', monospace" font-size="9" fill="#8888a0">.ndjson</text>

  <!-- Recordings output -->
  <rect x="616" y="260" width="160" height="50" rx="8" fill="#1a1a2e" stroke="#30363d" stroke-width="1.5"/>
  <!-- Play icon -->
  <circle cx="638" cy="285" r="8" fill="none" stroke="#da7756" stroke-width="1"/>
  <polygon points="636,281 636,289 642,285" fill="#da7756"/>
  <text x="650" y="282" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10" font-weight="600" fill="#e0e0e8">Recordings</text>
  <text x="650" y="297" font-family="-apple-system, 'SF Mono', monospace" font-size="9" fill="#8888a0">.cast (asciicast)</text>

  <!-- ==================== Labels ==================== -->

  <text x="400" y="480" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10" fill="#8888a0" opacity="0.5">SharedTerminal Enterprise v2.0 Architecture</text>
</svg>
